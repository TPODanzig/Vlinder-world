<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vlinder Tekenen</title>
<link rel="stylesheet" href="draw.css">
</head>
<body>
<div class="container">
  <h1>🦋 Maak je eigen vlinder</h1>
  <div class="color-picker">
    <div class="color-option active" data-color="#ff69b4" style="background:#ff69b4;" title="Roze"></div>
    <div class="color-option" data-color="#ffd700" style="background:#ffd700;" title="Goud"></div>
    <div class="color-option" data-color="#00bfff" style="background:#00bfff;" title="Blauw"></div>
    <div class="color-option" data-color="#00ff00" style="background:#00ff00;" title="Groen"></div>
    <div class="color-option" data-color="#ff4500" style="background:#ff4500;" title="Oranje"></div>
    <div class="color-option" data-color="#9370db" style="background:#9370db;" title="Paars"></div>
    <div class="color-option" data-color="eraser" style="background:transparent;" title="Gum">🧽</div>
  </div>
  <div class="canvas-container">
    <canvas id="canvas" width="600" height="400"></canvas>
  </div>
  <div class="controls">
    <button id="clearBtn">🗑️ Wis alles</button>
    <button id="sendBtn">🦋 Stuur vlinder naar tuin</button>
  </div>
  <div class="status" id="status"></div>
</div>

<script src="draw.js"></script>
</body>
</html>
